<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Mystery: Chapter 2 - Seeking the Truth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .aspect-ratio-box { aspect-ratio: 16 / 9; }
        
        @keyframes pulse-hover {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 12px rgba(255, 255, 255, 1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5)); }
        }
        
        @keyframes highlight-pulse {
            0% { box-shadow: 0 0 4px 1px rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.5); background-color: rgba(239, 68, 68, 0.05); }
            50% { box-shadow: 0 0 16px 4px rgba(239, 68, 68, 0.9); border-color: rgba(239, 68, 68, 1); background-color: rgba(239, 68, 68, 0.15); }
            100% { box-shadow: 0 0 4px 1px rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.5); background-color: rgba(239, 68, 68, 0.05); }
        }

        .highlight-input {
            animation: highlight-pulse 2s infinite ease-in-out;
            background-color: transparent;
            border: 2px solid transparent;
            border-radius: 4px;
            color: #1e293b;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif; /* Simulates real handwriting */
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .highlight-input:focus {
            animation: none; /* Stop blinking when user clicks inside to type */
            background-color: rgba(255, 255, 255, 0.9);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.4);
        }

        .interactive-item { position: absolute; cursor: pointer; transition: all 0.3s ease; }
        .interactive-item:hover { animation: pulse-hover 1.5s infinite ease-in-out; z-index: 10; }
        
        .hidden-scene { opacity: 0; pointer-events: none; position: absolute; inset: 0; transition: opacity 0.8s ease-in-out; }
        .active-scene { opacity: 1; pointer-events: auto; position: absolute; inset: 0; transition: opacity 0.8s ease-in-out; }
        .fade-in { transition: opacity 1s ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center justify-center p-4 select-none">

    <!-- Main Game Frame -->
    <div id="game-container" class="relative w-full max-w-5xl aspect-ratio-box bg-black shadow-2xl rounded-xl overflow-hidden border-4 border-gray-700">
        
        <!-- Scene 0: Start Screen -->
        <div id="scene-start" class="active-scene bg-gray-800 flex flex-col items-center justify-center text-white z-50">
            <h1 class="text-5xl font-bold mb-4 tracking-widest text-red-400">The Price of Lies</h1>
            <h2 class="text-2xl mb-12 text-gray-300">Chapter 2: Accident and Truth</h2>
            <button onclick="startGame()" class="px-8 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-full transition transform hover:scale-105 shadow-lg">Start Game</button>
        </div>

        <!-- Scene 1: Phone Call -->
        <div id="scene-phone" class="hidden-scene bg-gray-900 flex flex-col items-center justify-center z-40 relative">
            <div class="absolute inset-0 flex items-center justify-center opacity-10">
                <div class="w-64 h-64 border-4 border-red-500 rounded-full animate-ping"></div>
            </div>
            <div class="z-10 text-center">
                <div class="text-6xl mb-6">📱</div>
                <div id="phone-dialogue" class="text-2xl text-white font-semibold mb-8 max-w-2xl px-6 h-24 flex items-center justify-center"></div>
                <button id="btn-hospital" onclick="goToHospital()" class="hidden px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition shadow-lg">Rush to Hospital Immediately</button>
            </div>
        </div>

        <!-- Scene 2: Hospital Registration Desk -->
        <div id="scene-hospital" class="hidden-scene z-30 bg-black">
            <img src="scene 1-Registration Desk.png" alt="Hospital Registration Desk" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/1920x1080/2c3e50/ecf0f1?text=scene+1-Registration+Desk.png+Missing'">
            
            <!-- Interactive Visitor Logbook (Maintained perfect coordinates) -->
            <img src="Visitor log book-png.png" 
                 id="item-logbook"
                 class="interactive-item" 
                 style="left: 46%; top: 73%; width: 19%; transform-origin: center center;"
                 alt="Visitor Log Book"
                 title="Click to examine"
                 onclick="openLogBook()"
                 onerror="this.src='https://placehold.co/300x200/34495e/ecf0f1?text=Visitor+log+book-png.png+Missing'">
        </div>

        <!-- Popup: Logbook Details Overlay -->
        <div id="modal-logbook" class="hidden absolute inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4">
            <div class="relative w-full max-w-4xl aspect-[1095/892] flex items-center justify-center">
                <!-- Wrapper keeping the exact aspect ratio of 'visitor book 内頁設計.jpeg' to align overlays on all screens -->
                <div class="relative w-full h-full bg-stone-100 rounded shadow-2xl border-4 border-white">
                    <img src="visitor book 内頁設計.jpeg" alt="Visitor Log Details" class="w-full h-full object-contain mx-auto" onerror="this.src='https://placehold.co/1095x892/e2e8f0/1e293b?text=visitor+book+内頁設計.jpeg+Missing'">
                    
                    <!-- Input 1: Ward Blank (Below H42 in column 3) -->
                    <input type="text" id="input-ward" class="highlight-input absolute" 
                           style="top: 76.5%; left: 24.2%; width: 10%; height: 5.5%;" 
                           placeholder="Ward" autocomplete="off">
                           
                    <!-- Input 2: Relationship Blank (Right of Ruth Winters in column 6) -->
                    <input type="text" id="input-relation" class="highlight-input absolute" 
                           style="top: 76.5%; left: 69%; width: 15.5%; height: 5.5%;" 
                           placeholder="Relation" autocomplete="off">
                </div>

                <!-- Control Buttons -->
                <button onclick="closeLogBook()" class="absolute -top-10 right-0 text-white font-bold text-4xl hover:text-red-400 select-none">&times;</button>
                <button onclick="verifyLogBook()" class="absolute -bottom-14 left-1/2 transform -translate-x-1/2 px-8 py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg shadow-xl transition">
                    Verify & Sign Entry
                </button>
            </div>
        </div>
    </div>

    <!-- Nurse Sarah Dialogue Area (Directly below the image, guaranteed never to overlay) -->
    <div id="nurse-speech" class="hidden fade-in mt-6 p-6 bg-gray-800 w-full max-w-5xl rounded-xl border-2 border-gray-500 shadow-lg flex items-start space-x-4">
        <div class="w-14 h-14 rounded-full border-2 border-gray-400 bg-gray-700 flex-shrink-0 flex items-center justify-center text-2xl">👩‍⚕️</div>
        <div>
            <p class="text-blue-300 font-bold text-lg mb-1">Nurse Sarah :</p>
            <p id="nurse-dialogue-text" class="text-xl text-gray-100 font-semibold min-h-[30px]"></p>
        </div>
    </div>

    <!-- CUSTOM NOTIFICATION SYSTEM (Replacement for alert/confirm to prevent runtime compilation issues) -->
    <div id="custom-alert" class="hidden fixed inset-0 bg-black bg-opacity-75 z-[100] flex items-center justify-center p-4">
        <div class="bg-gray-800 border-2 border-gray-600 rounded-xl p-6 max-w-md w-full text-center shadow-2xl">
            <h3 id="alert-title" class="text-xl font-bold text-white mb-4">Notification</h3>
            <p id="alert-text" class="text-gray-300 mb-6 text-lg"></p>
            <button class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition" onclick="closeAlert()">OK</button>
        </div>
    </div>

    <script>
        // System Scene Switcher with absolute safety fallbacks to prevent "classList of null"
        function switchScene(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            
            if (hideEl) {
                hideEl.classList.remove('active-scene');
                hideEl.classList.add('hidden-scene');
            } else {
                console.warn(`Element with ID '${hideId}' was not found in the DOM.`);
            }
            
            if (showEl) {
                showEl.classList.remove('hidden-scene');
                showEl.classList.add('active-scene');
            } else {
                console.error(`CRITICAL: Element with ID '${showId}' was not found in the DOM.`);
            }
        }

        function startGame() { 
            switchScene('scene-start', 'scene-phone'); 
            playPhoneEvent(); 
        }
        
        function playPhoneEvent() {
            const dialogueEl = document.getElementById('phone-dialogue');
            const texts = [
                "Hello, is this Ruth Winter? Mother of Evelyn Anderson?", 
                "This is the Police. Your daughter had a severe car accident.", 
                "Please come to the hospital immediately!"
            ];
            let step = 0;
            function next() {
                if (dialogueEl) {
                    if (step < texts.length) { 
                        dialogueEl.innerHTML = texts[step++]; 
                        setTimeout(next, 2500); 
                    } else { 
                        const btn = document.getElementById('btn-hospital');
                        if (btn) btn.classList.remove('hidden'); 
                    }
                }
            }
            next();
        }

        function goToHospital() { 
            switchScene('scene-phone', 'scene-hospital'); 
            const speechBox = document.getElementById('nurse-speech');
            if (speechBox) speechBox.classList.remove('hidden');
            typeWriterStart();
        }

        const nurseText = "All visitors are required to sign in. Could you fill this out, please?";
        let typeIndex = 0;
        let typeTimer = null;

        function typeWriterStart() {
            const dialogueTextEl = document.getElementById('nurse-dialogue-text');
            if (dialogueTextEl) {
                dialogueTextEl.innerHTML = "";
                typeIndex = 0;
                if (typeTimer) clearTimeout(typeTimer);
                typeWriter();
            }
        }

        function typeWriter() {
            const dialogueTextEl = document.getElementById('nurse-dialogue-text');
            if (dialogueTextEl && typeIndex < nurseText.length) {
                dialogueTextEl.innerHTML += nurseText.charAt(typeIndex);
                typeIndex++;
                typeTimer = setTimeout(typeWriter, 40);
            }
        }

        function openLogBook() { 
            const modal = document.getElementById('modal-logbook');
            if (modal) modal.classList.remove('hidden'); 
        }

        function closeLogBook() { 
            const modal = document.getElementById('modal-logbook');
            if (modal) modal.classList.add('hidden'); 
        }

        // Custom Notification Controller
        function showAlert(title, message, callback) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-text').innerText = message;
            const alertModal = document.getElementById('custom-alert');
            alertModal.classList.remove('hidden');
            alertModal.callback = callback;
        }

        function closeAlert() {
            const alertModal = document.getElementById('custom-alert');
            alertModal.classList.add('hidden');
            if (alertModal.callback) {
                alertModal.callback();
                alertModal.callback = null;
            }
        }

        // Verify the blanks filled in by the player
        function verifyLogBook() {
            const wardValue = document.getElementById('input-ward').value.trim().toUpperCase();
            const relationValue = document.getElementById('input-relation').value.trim().toLowerCase();

            // Expected Ward: H18 (From Evelyn Anderson's row record)
            // Expected Relationship: Mother / Mom / Parent
            const isWardCorrect = (wardValue === "H18");
            const isRelationCorrect = (relationValue === "mother" || relationValue === "mom");

            if (isWardCorrect && isRelationCorrect) {
                closeLogBook();
                showAlert(
                    "Correct!", 
                    "Excellent work, Detective Grandma! You verified that Evelyn is in Ward H18 and signed in as her Mother. Let's head upstairs to her ward.",
                    function() {
                        // Progression callback
                        showCustomEndingPrompt();
                    }
                );
            } else {
                // Highlight error feedback
                let hintMessage = "Some information looks incorrect. Please review the Logbook entries:\n\n";
                if (!isWardCorrect) {
                    hintMessage += "• Look at Evelyn Anderson's row. What 'ward' is she staying in?\n";
                }
                if (!isRelationCorrect) {
                    hintMessage += "• You are Ruth Winters, mother of Evelyn. What is your 'relationship' to her?\n";
                }
                showAlert("Verification Failed", hintMessage);
            }
        }

        function showCustomEndingPrompt() {
            showAlert(
                "Chapter 2 - Registration Completed",
                "You have successfully signed the register. Next Chapter: Move inside the Wards to search for clues across Evelyn's hospital room walls."
            );
        }
    </script>
</body>
</html>
